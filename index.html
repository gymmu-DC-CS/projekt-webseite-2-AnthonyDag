<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Start Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            overflow: hidden;
        }
        
        .navbar {
            width: 100%;
            background: #333;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 10;
        }
        
        .navbar a {
            margin: 0 30px;
            font-size: 1.2em;
            color: #fff;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .navbar a:hover {
            color: #ffd700;
        }
        
        .nav-item {
            position: relative;
            display: flex;
            align-items: center;
            height: 100%;
        }
        
        .dropdown {
            position: absolute;
            top: calc(100% - 10px);
            left: -30px;
            background: #222;
            min-width: 160px;
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            z-index: 20;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
            pointer-events: none;
        }
        
        .dropdown a {
            color: #fff;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            transition: background 0.2s;
            margin: 0;
            font-size: 1em;
        }
        
        .dropdown a:hover {
            background: #ffd700;
            color: #333;
        }
        
        .dropdown a:first-child {
            border-radius: 4px 4px 0 0;
        }
        
        .dropdown a:last-child {
            border-radius: 0 0 4px 4px;
        }
        
        .nav-item > a {
            margin: 0 30px;
        }
        
        .nav-item:hover .dropdown {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }
        
        .dropdown:hover {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }
        
        .main-image {
            position: absolute;
            top: 80px;
            left: 0;
            width: 100vw;
            height: calc(100vh - 80px);
            overflow: hidden;
        }
        
        .main-image img {
            width: 100vw;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="nav-item">
            <a href="index.html">Home</a>
        </div>
        <div class="nav-item">
            <a href="about.html">Olympic Distance</a>
            <div class="dropdown">
                <a href="about.html">Distance</a>
                <a href="https://de.wikipedia.org/wiki/Triathlon#Geschichte">History</a>
                <a href="organisation-olympic.html">Organisation</a>
                <a href="athletes-olympic.html">Athletes</a>
            </div>
        </div>
        <div class="nav-item">
            <a href="contact.html">Middle Distance / Long Distance</a>
            <div class="dropdown">
                <a href="contact.html">Distance</a>
                <a href="history-long.html">History</a>
                <a href="organisation-long.html">Organisation</a>
                <a href="athletes-long.html">Athletes</a>
            </div>
        </div>
    </div>
    <div class="main-image">
        <img src="c:\Users\adag\Downloads\ChatGPT Image 16. März 2026, 16_55_05.png" alt="Main banner image">
    </div>
</body>
</html>
