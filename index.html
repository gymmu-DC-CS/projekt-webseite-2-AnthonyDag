<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Start Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            overflow: hidden;
        }
        
        .navbar {
            width: 100%;
            background: #333;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 10;
        }
        
        .navbar a {
            margin: 0 30px;
            font-size: 1.2em;
            color: #fff;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .navbar a:hover {
            color: #ffd700;
        }
        
        .main-image {
            position: absolute;
            top: 80px;
            left: 0;
            width: 100vw;
            height: calc(100vh - 80px);
            overflow: hidden;
        }
        
        .main-image img {
            width: 100vw;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="index.html">Home</a>
        <a href="about.html">Olympic Distance</a>
        <a href="gallery.html">Middle Distance</a>
        <a href="contact.html">Long Distance</a>
    </div>
    <div class="main-image">

    </div>
</body>
</html>
