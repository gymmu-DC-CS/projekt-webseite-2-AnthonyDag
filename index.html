<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Start Page</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            background: #f0f0f0;
        }
        .navbar {
            width: 100%;
            background: #333;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 60px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 10;
        }
        .navbar span {
            margin: 0 30px;
            font-size: 1.2em;
            cursor: pointer;
        }
        .main-image {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .main-image img {
            max-width: 100vw;
            max-height: 100vh;
            object-fit: cover;
        }
    </style>
</head>
</head>
    <body style="overflow: hidden;">
        <div class="navbar">
            <span>Home</span>
            <span>About</span>
            <span>Gallery</span>
            <span>Contact</span>
            <span>More</span>
        </div>
        <div class="main-image" style="margin-top:60px; pointer-events: none; user-select: none;">
            <img src="c:\Users\adag\Downloads\ChatGPT Image 16. März 2026, 16_55_05.png" alt="AI-generated abstract digital artwork featuring vibrant colors and ethereal shapes in a futuristic setting, conveying a sense of innovation and technology" style="width:100vw; height:calc(100vh - 60px); object-fit:cover; pointer-events: none; user-select: none; display:block;">
        </div>
</body>
</html>
