            cursor: pointer;

        }
        
        .nav-item > a:hover {

        }
        
        .dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: -30px;
            background: #222;
            min-width: 160px;
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            z-index: 20;
            margin-top: 8px;
        }
        
        .dropdown a {
            color: #fff;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            transition: background 0.2s;
            margin: 0;
            font-size: 1em;
        }
        
        .dropdown a:hover {
            background: #ffd700;
            color: #333;
        }
        
        .dropdown a:first-child {
            border-radius: 4px 4px 0 0;
        }
        
        .dropdown a:last-child {
            border-radius: 0 0 4px 4px;
        }
        
        .nav-item:hover .dropdown {
            display: block;
        }
        
        .dropdown:hover {
            display: block;
        }
        
        .container {
            margin-top: 120px;
            padding: 40px;
            text-align: center;
        }
        
        h1 {
            font-size: 2.5em;
            color: #333;
